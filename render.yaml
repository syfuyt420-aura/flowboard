# Render.com deployment configuration
# Docs: https://render.com/docs/yaml-spec

services:
  # ── Backend API ─────────────────────────────────────────────────
  - type: web
    name: flowboard-api
    runtime: docker
    dockerfilePath: apps/backend/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: flowboard-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: flowboard-redis
          type: redis
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false   # set to your Vercel URL after deploy
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        value: FlowBoard <noreply@flowboard.app>

  # ── Redis ────────────────────────────────────────────────────────
  - type: redis
    name: flowboard-redis
    plan: free
    maxmemoryPolicy: allkeys-lru

databases:
  # ── PostgreSQL ───────────────────────────────────────────────────
  - name: flowboard-db
    plan: free
    databaseName: flowboard
    user: flowboard
