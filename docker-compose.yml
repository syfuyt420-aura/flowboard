version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: flowboard-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: flowboard
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: flowboard-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: flowboard-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./apps/backend/.env
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/flowboard
      REDIS_URL: redis://redis:6379
    ports:
      - '3001:3001'
    volumes:
      - ./apps/backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: flowboard-web
    depends_on:
      - backend
    env_file:
      - ./apps/frontend/.env
    ports:
      - '5173:80'

volumes:
  postgres_data:
  redis_data:
